<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCC Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="top-bar">

    <div class="user-box">
      <img src="images/avatar-default.jpg" alt="Avatar" class="avatar">

      <div>
        <h3>Bonjour Sami</h3>
        <p>ID : BCC72891</p>
      </div>
    </div>

    <div class="notif">
      🔔
    </div>

  </header>


  <!-- CARTE -->
  <section class="wallet-card">

    <img src="images/dashboard-bg.png" alt="Dashboard" class="card-bg">

    <div class="wallet-info">
      <p class="balance-label">Solde Total</p>

      <h1>125 000 BCC</h1>

      <span>≈ 62 000 FCFA</span>

      <small>ID : BCC72891</small>
    </div>

  </section>


  <!-- ACTIONS -->
  <section class="quick-actions">

    <div class="action-btn">
      <div class="icon">↗</div>
      <p>Envoyer</p>
    </div>

    <div class="action-btn">
      <div class="icon">↙</div>
      <p>Recevoir</p>
    </div>

    <div class="action-btn">
      <div class="icon">⌁</div>
      <p>Scanner</p>
    </div>

    <div class="action-btn">
      <div class="icon">⇄</div>
      <p>Convertir</p>
    </div>

    <div class="action-btn full-width">
      <div class="icon">🕘</div>
      <p>Historique</p>
    </div>

  </section>


  <!-- ACTIVITÉS -->
  <section class="activities">

    <h2>Activités récentes</h2>

    <div class="activity-item">
      + 5 000 BCC reçus
    </div>

    <div class="activity-item">
      Conversion effectuée
    </div>

    <div class="activity-item">
      Gain quotidien
    </div>

  </section>


  <!-- NAVIGATION -->
  <nav class="bottom-nav">

    <a href="home.html" class="nav-item active">
      <span>⌂</span>
      <p>Accueil</p>
    </a>


    <a href="earn.html" class="bcc-center-btn">
      <img src="images/bcc-logo.png" alt="BCC">
    </a>


    <a href="profile.html" class="nav-item">
      <span>👤</span>
      <p>Profil</p>
    </a>

  </nav>


  <script src="script.js"></script>

</body>
</html>
